<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Calculator</title>
    <link rel="stylesheet" href="calculator.css">
</head>
<body>
    <div id="cal">
    <div id="console"></div>
    <div id="buttons">
        <button class="button" onclick="appendToConsole('7')">7</button>
        <button class="button" onclick="appendToConsole('8')">8</button>
        <button class="button" onclick="appendToConsole('9')">9</button>
        <button class="button" onclick="appendToConsole('/')">/</button>
        <br>
        <button class="button" onclick="appendToConsole('4')">4</button>
        <button class="button" onclick="appendToConsole('5')">5</button>
        <button class="button" onclick="appendToConsole('6')">6</button>
        <button class="button" onclick="appendToConsole('*')">*</button>
        <br>
        <button class="button" onclick="appendToConsole('1')">1</button>
        <button class="button" onclick="appendToConsole('2')">2</button>
        <button class="button" onclick="appendToConsole('3')">3</button>
        <button class="button" onclick="appendToConsole('-')">-</button>
        <br>
        <button class="button" onclick="appendToConsole('0')">0</button>
        <button class="button" onclick="appendToConsole('.')">.</button>
        <button class="button" onclick="calculate()">=</button>
        <button class="button" onclick="appendToConsole('+')">+</button>
        <br>
        <button class="button"  onclick="clearConsole()">C</button>

    </div>

    </div>

    <script src="calculator.js"></script>

    
</body>
</html>
