<html>
<head>
  <script src="https://code.jquery.com/jquery-4.0.0.js"></script>
  
<script>
    $(document).ready (function (){
    $("#b1").click(function(){
    $("#p1").css("display", "block");
    })
 

$("#b1").click(function(){
   
   $("#p2").css("font-style", "italic");
   $("#p2").css("display", "block");
    })
 

$("#b1").click(function(){
   
   $("#p3").css("text-decoration" , "underline");
   $("#p3").css("display", "block");
    })
    }
)
</script>
  
</head>
<body>
<h3>JQuery assignment 1</h3>
<p id="p1" style="display: none">Hello</p>
<p id="p2" style="display:none">Hello</p>
<p id="p3" style="display: none">Hello</p>
 

<button id="b1">OK</button>
 

</body>
</html>
