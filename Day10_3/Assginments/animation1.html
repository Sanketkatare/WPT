<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <div id="box" style="height: 50px; width: 50px; background: blueviolet;"></div>
    <button id="change">start</button>
</body>

<script src="https://code.jquery.com/jquery-4.0.0.js"></script>

<script>
    let box = $("#box")
    $("#change").click (function()
{
    // box.animate({left: "+=2500px"},500);
    box.css("position","relative").animate({left:"250px"},800);
    box.animate({width: "200px"},500);
    box.animate({height: "200px"},500);
    
});

$("#change").click(function() {
        box.fadeToggle(600);
    });
</script>
</html>
